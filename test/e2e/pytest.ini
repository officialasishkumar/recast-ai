[pytest]
minversion = 8.0
testpaths = .
addopts =
    -ra
    --strict-markers
    --tb=short
    -p no:cacheprovider
markers =
    slow: tests that poll the full pipeline (may take several minutes)
    share: tests covering public share links
    regenerate: tests covering segment regeneration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s %(levelname)s %(name)s %(message)s
