name: E2E

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: End-to-End (fake Gemini)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      FAKE_GEMINI: "1"
      GEMINI_API_KEY: "fake-key-for-determinism"
      TTS_PROVIDER: gtts
      LOG_LEVEL: info
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: recast
      DB_PASSWORD: recast
      DB_NAME: recast
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      S3_ENDPOINT: localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: recast
      JWT_SECRET: dev-secret-e2e
      ENVIRONMENT: test
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: recast
          POSTGRES_PASSWORD: recast
          POSTGRES_DB: recast
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U recast"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics check_port_connectivity"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: recast
        ports:
          - 9000:9000
          - 9001:9001
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg postgresql-client

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            services/video-analyzer/requirements.txt
            services/tts-service/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-e2e-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-e2e-

      - name: Apply database migrations
        run: |
          for f in migrations/*.up.sql; do
            echo "Applying $f"
            PGPASSWORD=recast psql -h localhost -U recast -d recast -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Install Python deps (video-analyzer)
        run: |
          python -m pip install --upgrade pip
          pip install -r services/video-analyzer/requirements.txt

      - name: Install Python deps (tts-service)
        run: pip install -r services/tts-service/requirements.txt

      - name: Build Go services
        run: make build-go

      - name: Start Go services
        run: |
          mkdir -p /tmp/recast-logs
          nohup ./bin/api-gateway      > /tmp/recast-logs/api-gateway.log      2>&1 &
          echo $! > /tmp/recast-logs/api-gateway.pid
          nohup ./bin/upload-service   > /tmp/recast-logs/upload-service.log   2>&1 &
          echo $! > /tmp/recast-logs/upload-service.pid
          nohup ./bin/mux-service      > /tmp/recast-logs/mux-service.log      2>&1 &
          echo $! > /tmp/recast-logs/mux-service.pid
          nohup ./bin/delivery-service > /tmp/recast-logs/delivery-service.log 2>&1 &
          echo $! > /tmp/recast-logs/delivery-service.pid

      - name: Start Python services
        run: |
          pushd services/video-analyzer >/dev/null
          nohup python main.py > /tmp/recast-logs/video-analyzer.log 2>&1 &
          echo $! > /tmp/recast-logs/video-analyzer.pid
          popd >/dev/null
          pushd services/tts-service >/dev/null
          nohup python main.py > /tmp/recast-logs/tts-service.log 2>&1 &
          echo $! > /tmp/recast-logs/tts-service.pid
          popd >/dev/null

      - name: Wait for api-gateway readiness
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/healthz > /dev/null 2>&1 || \
               curl -fsS http://localhost:8080/v1/health > /dev/null 2>&1; then
              echo "api-gateway is up"
              exit 0
            fi
            sleep 2
          done
          echo "api-gateway did not become ready in time" >&2
          exit 1

      - name: Run E2E harness
        run: |
          if [ ! -x scripts/e2e-run.sh ]; then
            echo "scripts/e2e-run.sh not found or not executable" >&2
            exit 1
          fi
          ./scripts/e2e-run.sh

      - name: Collect service logs on failure
        if: failure()
        run: |
          echo "=== service logs ==="
          for f in /tmp/recast-logs/*.log; do
            echo "----- $f -----"
            tail -n 300 "$f" || true
          done
          echo "=== docker ps ==="
          docker ps -a || true
          echo "=== docker logs (if any) ==="
          for cid in $(docker ps -aq); do
            echo "----- $cid -----"
            docker logs --tail=200 "$cid" || true
          done

      - name: Upload service logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-service-logs
          path: /tmp/recast-logs
          if-no-files-found: ignore
          retention-days: 7
