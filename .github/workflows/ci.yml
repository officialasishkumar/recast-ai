name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-lint-test:
    name: Go Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: recast
          POSTGRES_PASSWORD: recast
          POSTGRES_DB: recast
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U recast"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run migrations
        env:
          PGHOST: localhost
          PGUSER: recast
          PGPASSWORD: recast
          PGDATABASE: recast
        run: psql -f migrations/001_init.up.sql

      - name: Run tests
        env:
          DB_HOST: localhost
          REDIS_HOST: localhost
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.txt

  python-lint-test:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [llm-orchestrator, tts-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r services/${{ matrix.service }}/requirements.txt
          pip install ruff pytest

      - name: Lint
        run: ruff check services/${{ matrix.service }}/

      - name: Type check (optional)
        run: ruff check --select=E,W services/${{ matrix.service }}/ || true

  web-lint-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: cd web && npm ci

      - name: Lint
        run: cd web && npm run lint

      - name: Build
        run: cd web && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/v1

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [go-lint-test, python-lint-test, web-lint-build]
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - upload-service
          - frame-extractor
          - mux-service
          - delivery-service
          - llm-orchestrator
          - tts-service
          - web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.service }}.Dockerfile
          push: false
          tags: recast-ai/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
