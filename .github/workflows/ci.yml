name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-lint-test:
    name: Go Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: recast
          POSTGRES_PASSWORD: recast
          POSTGRES_DB: recast
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U recast"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v1.62
          args: --timeout=5m

      - name: Run migrations
        env:
          PGHOST: localhost
          PGUSER: recast
          PGPASSWORD: recast
          PGDATABASE: recast
        run: psql -f migrations/001_init.up.sql

      - name: Go vet
        run: go vet ./...

      - name: Run tests with coverage
        env:
          DB_HOST: localhost
          REDIS_HOST: localhost
        run: |
          go test -race -coverprofile=coverage.txt -covermode=atomic \
            ./pkg/... \
            ./cmd/... \
            ./internal/...

      - name: Verify observability coverage
        run: go test -race -count=1 ./pkg/observability/...

      - name: Verify resilience coverage
        run: go test -race -count=1 ./pkg/resilience/...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.txt
          if-no-files-found: warn

  python-lint-test:
    name: Python Lint & Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service: [video-analyzer, tts-service]
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/${{ matrix.service }}/requirements.txt
          pip install ruff pytest pytest-asyncio mypy

      - name: Ruff lint
        run: ruff check services/${{ matrix.service }}/

      - name: Ruff format check
        run: ruff format --check services/${{ matrix.service }}/ || true

      - name: Mypy (best effort)
        run: |
          if [ -f services/${{ matrix.service }}/mypy.ini ] || \
             [ -f services/${{ matrix.service }}/pyproject.toml ]; then
            mypy services/${{ matrix.service }}/ || true
          else
            echo "No mypy config found; skipping strict type check."
          fi

      - name: Pytest
        working-directory: services/${{ matrix.service }}
        run: pytest -v tests/

  web-lint-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Build
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/v1
          NEXT_PUBLIC_WS_URL: ws://localhost:8080/v1
        run: npm run build

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [go-lint-test, python-lint-test, web-lint-build]
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - upload-service
          - mux-service
          - delivery-service
          - video-analyzer
          - tts-service
          - web
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.service }}.Dockerfile
          push: false
          load: false
          tags: recast-ai/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
