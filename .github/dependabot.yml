version: 2
updates:
  # --- Go modules ---
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "type:dependencies"
      - "area:backend"
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      go-minor-and-patch:
        update-types:
          - minor
          - patch

  # --- Python: video-analyzer service ---
  - package-ecosystem: pip
    directory: "/services/video-analyzer"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "type:dependencies"
      - "area:video-analyzer"
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      python-minor-and-patch:
        update-types:
          - minor
          - patch

  # --- Python: tts-service ---
  - package-ecosystem: pip
    directory: "/services/tts-service"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "type:dependencies"
      - "area:tts"
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      python-minor-and-patch:
        update-types:
          - minor
          - patch

  # --- Frontend (Next.js 16 / React 19) ---
  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "type:dependencies"
      - "area:frontend"
    commit-message:
      prefix: "chore(deps)"
      include: scope
    ignore:
      # Major version bumps for the framework and React need human review.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch

  # --- Dockerfiles ---
  - package-ecosystem: docker
    directory: "/docker"
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "type:dependencies"
      - "area:infra"
    commit-message:
      prefix: "chore(docker)"
      include: scope

  # --- GitHub Actions ---
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "type:dependencies"
      - "area:ci"
    commit-message:
      prefix: "chore(ci)"
      include: scope
