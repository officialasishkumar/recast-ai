services:
  # --- Go Services ---

  - type: web
    name: recast-api-gateway
    runtime: docker
    dockerfilePath: ./docker/api-gateway.Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - fromGroup: recast-shared
      - key: PORT
        value: "8080"
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: RATE_LIMIT_PER_MIN
        value: "60"

  - type: web
    name: recast-upload
    runtime: docker
    dockerfilePath: ./docker/upload-service.Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - fromGroup: recast-shared

  - type: web
    name: recast-mux
    runtime: docker
    dockerfilePath: ./docker/mux-service.Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - fromGroup: recast-shared

  - type: web
    name: recast-delivery
    runtime: docker
    dockerfilePath: ./docker/delivery-service.Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - fromGroup: recast-shared

  # --- Python Services ---

  - type: web
    name: recast-video-analyzer
    runtime: docker
    dockerfilePath: ./docker/video-analyzer.Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - fromGroup: recast-shared
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-pro
      - key: GEMINI_FALLBACK_MODEL
        value: gemini-2.5-flash

  - type: web
    name: recast-tts
    runtime: docker
    dockerfilePath: ./docker/tts-service.Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - fromGroup: recast-shared
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: TTS_PROVIDER
        value: gtts
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1

envVarGroups:
  - name: recast-shared
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_TLS
        value: "true"
      - key: RABBITMQ_URL
        sync: false
      - key: RABBITMQ_URL_OVERRIDE
        sync: false
      - key: RABBITMQ_HOST
        sync: false
      - key: RABBITMQ_PORT
        value: "5672"
      - key: RABBITMQ_USER
        sync: false
      - key: RABBITMQ_PASSWORD
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        value: recast
      - key: S3_USE_SSL
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: LOG_LEVEL
        value: info
